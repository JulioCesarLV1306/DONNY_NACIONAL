<div class="p-grid" style="height:100vh;padding: 30px 0px 20px 0px">
    <div class="p-col-5 ">
      <video preload="auto" style="height: 94vh; float:left" #video_elegir_archivos>
        <source src="http://localhost:4568/videos/ELEGIR-ARCHIVOS.mp4" type="video/mp4" />
      </video>
    </div>
    <div class="p-col-7 contenedor-lista">
      <p-card [style]="{'border-radius':'20px','height':'auto','padding-bottom':'10px'}">
        <ng-template pTemplate="header">
          <h1 class="titulo-lista">¿QUÉ NECESITA DESCARGAR?</h1>
          <h3 class="detalle-expediente">{{expedienteActual.instanciaActual}}</h3>
          <h2  class="titulo-expediente">{{expedienteActual.formatoExpediente}}</h2>
          <h3 class="detalle-secretario" >Secretario: {{expedienteActual.especialistaLegal}}</h3>
          <h3 class="detalle-expediente" style="max-height:4rem; overflow: hidden;">{{expedienteActual.sumilla}}</h3>

        </ng-template>
          <div  *ngFor="let eleccion of listaEleccion; index as i">
          <p-card  [style]="{'border-radius':'10px', 'margin':'25px'}"  >
            <div class="contenedor-item"> 
              <div class="item-contenido" >
                <!--p-checkbox [(ngModel)]="eleccion.checked" [binary]="true"></p-checkbox-->
                <p-radioButton [value]="eleccion" [(ngModel)]="opcionSelected"></p-radioButton>
                  <img src="{{eleccion.icono}}">
                  <label *ngIf="!eleccion.active" class="titulo-conteo" style=" text-decoration: line-through; color: darkgrey;">{{eleccion.titulo}} ({{eleccion.conteo}})</label>
                  <label *ngIf="eleccion.active" class="titulo-conteo" >{{eleccion.titulo}} ({{eleccion.conteo}})</label>
              </div>
            </div>
          </p-card>
        </div>
  
      </p-card>
      <!--div class="wrapper">
        <div class="item">
          <div class="contenedor-next">
            <h2 style="float:left; margin-top: 0; margin-bottom: 0; margin-right: 2px;">SIGUIENTE</h2>
            <fa-icon class ="arrow1" [icon]="faArrow" aria-hidden="true" size="2x"></fa-icon>
        </div>
        </div>
      
      </div-->
    </div>
   
  </div>  

  
<app-volver volverRoute="lista-expedientes/0"></app-volver>
